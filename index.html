<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HyperZeta — Apps</title>
    <style>
        :root { --bg: #0f1115; --card: #181b22; --text: #e8e8ea; --muted: #9aa0aa; --accent: #ff2d87; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
        .wrap { max-width: 760px; margin: 0 auto; padding: 56px 20px 80px; }
        header { margin-bottom: 40px; }
        h1 { font-size: 2rem; margin: 0 0 6px; }
        .tagline { color: var(--muted); margin: 0; }
        h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted);
             margin: 40px 0 14px; }
        .app { background: var(--card); border: 1px solid #242833; border-radius: 14px;
               padding: 20px 22px; margin-bottom: 14px; }
        .app h3 { margin: 0 0 4px; font-size: 1.2rem; }
        .app p { margin: 0 0 12px; color: var(--muted); }
        .links a { color: var(--accent); text-decoration: none; font-size: .95rem; margin-right: 18px; }
        .links a:hover { text-decoration: underline; }
        footer { margin-top: 56px; color: var(--muted); font-size: .85rem; border-top: 1px solid #242833;
                 padding-top: 20px; }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>HyperZeta</h1>
        <p class="tagline">Lightweight, privacy-respecting Android apps.</p>
    </header>

    <h2>Apps</h2>

    <div class="app">
        <h3>VolumeCTRL</h3>
        <p>Floating volume control with a radial dial and a media volume booster.</p>
        <div class="links">
            <a href="https://play.google.com/store/apps/details?id=com.hyperzeta.volumectrl">Google Play</a>
            <a href="volumectrl/privacy-policy.html">Privacy Policy</a>
        </div>
    </div>

    <!-- Add future apps here:
    <div class="app">
      <h3>App Name</h3>
      <p>Short description.</p>
      <div class="links">
        <a href="https://play.google.com/store/apps/details?id=PACKAGE">Google Play</a>
        <a href="appfolder/privacy-policy.html">Privacy Policy</a>
      </div>
    </div>
    -->

    <footer>
        Contact: <a href="mailto:hyperzetaz@gmail.com">hyperzetaz@gmail.com</a>
    </footer>
</div>
</body>
</html>
